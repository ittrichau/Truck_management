{% extends "base.html" %}
{% block title %}Sửa xe {{ truck.license_plate }}{% endblock %}
{% block content %}
<div class="mx-auto" style="max-width: 550px;">
    <h5 class="mb-3"><i class="bi bi-pencil-square"></i> Sửa xe {{ truck.license_plate }}</h5>
    <div class="card"><div class="card-body">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Biển số xe *</label>
            <input type="text" name="license_plate" class="form-control" required value="{{ truck.license_plate }}">
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6"><label class="form-label">Hãng xe</label><input type="text" name="brand" class="form-control" value="{{ truck.brand or '' }}"></div>
            <div class="col-6"><label class="form-label">Năm SX</label><input type="number" name="year" class="form-control" value="{{ truck.year or '' }}"></div>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6"><label class="form-label">Tải trọng (tấn)</label><input type="number" step="0.1" name="capacity_ton" class="form-control" value="{{ truck.capacity_ton or 0 }}"></div>
            <div class="col-6"><label class="form-label">Định mức xăng (l/100km)</label><input type="number" step="0.1" name="fuel_rate" class="form-control" value="{{ truck.fuel_rate or 0 }}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Số KM hiện tại</label>
            <input type="number" name="current_km" class="form-control" value="{{ truck.current_km or 0 }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Trạng thái</label>
            <select name="status" class="form-select">
                <option value="available" {% if truck.status == 'available' %}selected{% endif %}>Sẵn sàng</option>
                <option value="in_trip" {% if truck.status == 'in_trip' %}selected{% endif %}>Đang chạy</option>
                <option value="maintenance" {% if truck.status == 'maintenance' %}selected{% endif %}>Bảo dưỡng</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Ghi chú</label>
            <textarea name="notes" class="form-control" rows="2">{{ truck.notes or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg-mobile"><i class="bi bi-check-lg"></i> Cập nhật</button>
        <a href="{{ url_for('trucks.index') }}" class="btn btn-outline-secondary w-100 mt-2 btn-lg-mobile">Quay lại</a>
    </form>
    </div></div>
</div>
{% endblock %}
