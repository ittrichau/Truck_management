{% extends "base.html" %}
{% block title %}Thêm xe mới{% endblock %}
{% block content %}
<div class="mx-auto" style="max-width: 550px;">
    <h5 class="mb-3"><i class="bi bi-truck"></i> Thêm xe mới</h5>
    <div class="card"><div class="card-body">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Biển số xe *</label>
            <input type="text" name="license_plate" class="form-control" required placeholder="Ví dụ: 51C-123.45">
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6"><label class="form-label">Hãng xe</label><input type="text" name="brand" class="form-control" placeholder="Huyndai, Isuzu..."></div>
            <div class="col-6"><label class="form-label">Năm SX</label><input type="number" name="year" class="form-control" placeholder="2020"></div>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6"><label class="form-label">Tải trọng (tấn)</label><input type="number" step="0.1" name="capacity_ton" class="form-control" placeholder="15.0"></div>
            <div class="col-6"><label class="form-label">Định mức xăng (l/100km)</label><input type="number" step="0.1" name="fuel_rate" class="form-control" placeholder="30"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Số KM hiện tại</label>
            <input type="number" name="current_km" class="form-control" placeholder="0">
        </div>
        <div class="mb-3">
            <label class="form-label">Trạng thái</label>
            <select name="status" class="form-select">
                <option value="available">Sẵn sàng</option>
                <option value="maintenance">Bảo dưỡng</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Ghi chú</label>
            <textarea name="notes" class="form-control" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-success w-100 btn-lg-mobile">
            <i class="bi bi-check-lg"></i> Thêm xe
        </button>
        <a href="{{ url_for('trucks.index') }}" class="btn btn-outline-secondary w-100 mt-2 btn-lg-mobile">Quay lại</a>
    </form>
    </div></div>
</div>
{% endblock %}
