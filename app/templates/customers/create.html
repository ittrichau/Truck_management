{% extends "base.html" %}
{% block title %}Thêm hàng / khách hàng mới{% endblock %}
{% block content %}
<div class="mx-auto" style="max-width: 550px;">
    <h5 class="mb-3"><i class="bi bi-box-seam"></i> Thêm hàng / khách hàng</h5>
    <div class="card"><div class="card-body">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Tên hàng / khách hàng *</label>
            <input type="text" name="name" class="form-control" required placeholder="Ví dụ: Dừa anh Dĩ, Lúa dì Giỏi">
        </div>
        <div class="mb-3">
            <label class="form-label">Loại hàng hóa</label>
            <input type="text" name="cargo_type" class="form-control" placeholder="Dừa, Lúa, Thép...">
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6"><label class="form-label">Điểm đi mặc định</label><input type="text" name="default_origin" class="form-control" placeholder="Bến Tre"></div>
            <div class="col-6"><label class="form-label">Điểm đến mặc định</label><input type="text" name="default_destination" class="form-control" placeholder="Tây Ninh"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <input type="tel" name="contact_phone" class="form-control" placeholder="09xx...">
        </div>
        <div class="mb-3">
            <label class="form-label">Ghi chú</label>
            <textarea name="notes" class="form-control" rows="2" placeholder="Địa chỉ kho, lưu ý..."></textarea>
        </div>
        <button type="submit" class="btn btn-success w-100 btn-lg-mobile"><i class="bi bi-check-lg"></i> Thêm</button>
        <a href="{{ url_for('customers.index') }}" class="btn btn-outline-secondary w-100 mt-2 btn-lg-mobile">Quay lại</a>
    </form>
    </div></div>
</div>
{% endblock %}
