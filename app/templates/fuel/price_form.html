{% extends "base.html" %}
{% block title %}Thêm giá xăng mới{% endblock %}
{% block content %}
<div class="mx-auto" style="max-width: 500px;">
    <h5 class="mb-3"><i class="bi bi-plus-circle"></i> Thêm giá xăng mới</h5>
    <div class="card"><div class="card-body">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Giá (VNĐ/lít) *</label>
            <input type="number" name="price_per_liter" class="form-control" required placeholder="25000" step="1">
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="form-label">Hiệu lực từ *</label>
                <input type="datetime-local" name="effective_from" class="form-control" required value="{{ today_15h }}">
                <small class="text-muted">Chọn ngày và giờ bắt đầu áp dụng</small>
            </div>
            <div class="col-6">
                <label class="form-label">Đến ngày <span class="text-muted">(tùy chọn)</span></label>
                <input type="datetime-local" name="effective_to" class="form-control">
                <small class="text-muted">Để trống nếu giá này đang hiện hành. Hệ thống sẽ tự động đóng giá cũ.</small>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Ghi chú</label>
            <textarea name="notes" class="form-control" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-check-circle"></i> Lưu giá xăng
        </button>
        <a href="{{ url_for('fuel.price_list') }}" class="btn btn-outline-secondary w-100 mt-2">Quay lại</a>
    </form>
    </div></div>
</div>
{% endblock %}
