{% extends "base.html" %} {% block title %}Thêm tài xế mới{% endblock %} {%
block content %}
<div class="mx-auto" style="max-width: 500px">
  <h5 class="mb-3"><i class="bi bi-person-plus"></i> Thêm tài xế mới</h5>
  <div class="card">
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Tên đăng nhập *</label>
          <input
            type="text"
            name="username"
            class="form-control"
            required
            placeholder="Ví dụ: trongnghia"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Họ tên đầy đủ *</label>
          <input
            type="text"
            name="full_name"
            class="form-control"
            required
            placeholder="Ví dụ: Trọng Nghĩa"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Số điện thoại</label>
          <input
            type="tel"
            name="phone"
            class="form-control"
            placeholder="09xx..."
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Xe mặc định (gán cứng)</label>
          <select name="current_truck_id" class="form-select">
            <option value="">-- Chưa gán xe --</option>
            {% for t in trucks %}
            <option value="{{ t.id }}">{{ t.license_plate }}</option>
            {% endfor %}
          </select>
          <small class="text-muted"
            >Xe đã gán cho tài xế khác sẽ không hiển thị</small
          >
        </div>
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label">Mật khẩu *</label>
            <input
              type="password"
              name="password"
              class="form-control"
              required
              minlength="6"
            />
          </div>
          <div class="col-6">
            <label class="form-label">Xác nhận mật khẩu *</label>
            <input
              type="password"
              name="confirm_password"
              class="form-control"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn btn-success w-100 btn-lg-mobile">
          <i class="bi bi-check-lg"></i> Thêm tài xế
        </button>
        <a
          href="{{ url_for('drivers.index') }}"
          class="btn btn-outline-secondary w-100 mt-2 btn-lg-mobile"
          >Quay lại</a
        >
      </form>
    </div>
  </div>
</div>
{% endblock %}
